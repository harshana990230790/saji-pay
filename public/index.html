<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAJI PAY PRO</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:#1e293b;
width:380px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.5);
}
.logo{
width:220px;
margin-bottom:20px;
}
h2{
color:#fff;
margin-bottom:20px;
}
input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}
button{
width:100%;
padding:14px;
background:#00c853;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
button:hover{
background:#00a844;
}
p{
color:#ccc;
margin-top:15px;
font-size:14px;
}
</style>
</head>

<body><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBU8uMz4pUH_PIgfQo462xhCX0omhxIOAY",
  authDomain: "saji-pay-pro.firebaseapp.com",
  projectId: "saji-pay-pro",
  storageBucket: "saji-pay-pro.firebasestorage.app",
  messagingSenderId: "33717137910",
  appId: "1:33717137910:web:53dcc4237644f63a7b97d7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const email = document.querySelector('input[type="email"]');
const password = document.querySelector('input[type="password"]');
const button = document.querySelector("button");

button.addEventListener("click", async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    alert("Login Successful");
    window.location.href = "admin.html";
  } catch (e) {
    alert("Invalid Email or Password");
  }
});
</script>

<div class="card">

<img src="logo.jpg.jpeg" class="logo">

<h2>Member Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>LOGIN</button>

<p>SAJI PAY PRO</p>

</div>

</body>
</html>
